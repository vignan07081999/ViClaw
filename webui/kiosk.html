<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViClaw Kiosk Evolution</title>
    <!-- Premium Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@7.2.3/dist/gridstack.min.css" />
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/gridstack@7.2.3/dist/gridstack-all.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #05070a;
            --accent-blue: #38bdf8;
            --accent-magenta: #f472b6;
            --card-bg: rgba(15, 23, 42, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            --glass: blur(25px) saturate(180%);
            --radius-lg: 24px;
            --radius-md: 16px;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(244, 114, 182, 0.1) 0%, transparent 50%);
        }

        /* --- Steam Deck / Homarr Hybrid Layout --- */
        #main-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Sidebar - Homarr Style Widget Gallery */
        #widget-sidebar {
            width: 320px;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: var(--glass);
            border-right: 1px solid var(--card-border);
            padding: 30px;
            transform: translateX(-100%);
            position: absolute;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #widget-sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gallery-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .gallery-item:hover {
            background: rgba(56, 189, 248, 0.15);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .gallery-item .icon-box {
            width: 40px;
            height: 40px;
            background: var(--accent-blue);
            color: #000;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* Main Viewport */
        #viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0;
            position: relative;
        }

        header {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 50;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn.active {
            background: var(--accent-blue);
            color: #000;
            border: none;
        }

        /* Grid */
        .grid-stack {
            flex: 1;
            overflow-y: auto !important;
            padding: 20px 40px 40px 40px;
        }

        .grid-stack-item-content {
            background: var(--card-bg) !important;
            backdrop-filter: var(--glass);
            border: 1px solid var(--card-border) !important;
            border-radius: var(--radius-lg) !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.3s, transform 0.3s;
        }

        .grid-stack-item:hover .grid-stack-item-content {
            border-color: rgba(56, 189, 248, 0.4) !important;
        }

        .widget-head {
            height: 50px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: grab;
            user-select: none;
        }

        .widget-head .title {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--text-dim);
            letter-spacing: 1.5px;
        }

        .widget-body {
            flex: 1;
            padding: 0;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- Custom Widgets --- */
        .w-clock-lg {
            text-align: center;
        }

        .w-clock-lg .time {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
            color: var(--accent-blue);
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.3));
        }

        .w-clock-lg .date {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-top: 10px;
        }

        /* Mascot Bot */
        .bot-wrap {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #bot-canvas {
            width: 100%;
            height: 100%;
            transition: opacity 1s ease;
            opacity: 0;
        }

        #bot-canvas.ready {
            opacity: 1;
        }

        .bot-loader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        .thought-bubble {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--accent-blue);
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-align: center;
            width: 80%;
            display: none;
            z-index: 10;
        }

        /* Context Menu / Settings */
        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .settings-card {
            background: #1e293b;
            border: 1px solid var(--card-border);
            width: 400px;
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
        }

        input,
        select {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            color: #fff;
            border: 1px solid #334155;
            border-radius: 12px;
            margin: 10px 0 25px 0;
            font-family: inherit;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* Edit Mode Highlights */
        body.editing .grid-stack-item-content {
            outline: 2px dashed var(--accent-blue);
            outline-offset: -2px;
        }
    </style>
</head>

<body class="zero-auth">
    <div id="main-container">
        <!-- Sidebar Widget Gallery -->
        <aside id="widget-sidebar">
            <div class="sidebar-header">
                <h3 style="font-weight: 800;">Widgets</h3>
                <button class="btn" style="padding: 5px 10px;" onclick="toggleSidebar()">✕</button>
            </div>
            <div class="gallery-item" onclick="createWidget('clock', 'Clock')">
                <div class="icon-box">🕒</div>
                <div><strong>Clock</strong>
                    <div style="font-size:0.7rem; opacity:0.6;">Time & Date</div>
                </div>
            </div>
            <div class="gallery-item" onclick="createWidget('agent', 'Pill Bot')">
                <div class="icon-box">🤖</div>
                <div><strong>Pill Bot</strong>
                    <div style="font-size:0.7rem; opacity:0.6;">3D AI Companion</div>
                </div>
            </div>
            <div class="gallery-item" onclick="createWidget('iframe', 'Embed')">
                <div class="icon-box">🔗</div>
                <div><strong>External Site</strong>
                    <div style="font-size:0.7rem; opacity:0.6;">HaSS, Octoprint, etc.</div>
                </div>
            </div>
            <div class="gallery-item" onclick="createWidget('stats', 'System')">
                <div class="icon-box">📊</div>
                <div><strong>Health</strong>
                    <div style="font-size:0.7rem; opacity:0.6;">CPU, RAM, Status</div>
                </div>
            </div>
        </aside>

        <!-- Main Viewport -->
        <div id="viewport">
            <header>
                <div class="brand">VICLAW EVOLUTION</div>
                <div class="controls">
                    <button id="btn-edit" class="btn" onclick="toggleEditMode()">
                        <span>⚙️</span> Edit Mode
                    </button>
                    <button class="btn" onclick="toggleSidebar()">
                        <span>🧩</span> Add Widget
                    </button>
                    <button class="btn active" onclick="saveLayout()">
                        <span>💾</span> Save
                    </button>
                </div>
            </header>

            <div class="grid-stack"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-overlay" class="settings-overlay">
        <div class="settings-card">
            <h2 id="settings-title" style="margin-bottom:10px;">Widget Settings</h2>
            <input type="hidden" id="edit-id">
            <label>Title</label>
            <input type="text" id="edit-title">
            <label id="url-label">URL / Endpoint</label>
            <input type="text" id="edit-url">
            <div style="display:flex; gap:12px;">
                <button class="btn active" style="flex:1;" onclick="applySettings()">Apply</button>
                <button class="btn" style="flex:1;" onclick="closeSettings()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let grid = GridStack.init({
            cellHeight: 80,
            margin: 15,
            staticGrid: true,
            float: true,
            animate: true
        });

        let isEditing = false;
        let widgets = {}; // Persistent metadata

        // --- 3D Mascot Logic (Pill Bot) ---
        let bot = { scene: null, camera: null, renderer: null, pill: null, eyes: [], hands: [] };
        let botState = 'idle';

        function initPillBot(containerId, widgetId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.domElement.id = 'bot-canvas';
            container.appendChild(renderer.domElement);

            // Removing loader and showing canvas
            const loader = document.getElementById(`loader-${widgetId}`);
            if (loader) loader.style.display = 'none';
            setTimeout(() => renderer.domElement.classList.add('ready'), 50);

            // Lighting
            const hLight = new THREE.HemisphereLight(0xffffff, 0x080820, 1);
            scene.add(hLight);
            const pLight = new THREE.PointLight(0x38bdf8, 2);
            pLight.position.set(2, 2, 5);
            scene.add(pLight);

            // Pill Body
            const bodyGroup = new THREE.Group();
            const bodyGeo = new THREE.CapsuleGeometry(0.8, 1, 32, 32);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0x1e293b,
                metalness: 0.6,
                roughness: 0.1,
                emissive: 0x38bdf8,
                emissiveIntensity: 0.1
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            bodyGroup.add(body);

            // Digital Faceplate
            const faceGeo = new THREE.SphereGeometry(0.7, 32, 16, 0, Math.PI, 0, Math.PI / 2);
            const faceMat = new THREE.MeshBasicMaterial({ color: 0x020617 });
            const face = new THREE.Mesh(faceGeo, faceMat);
            face.rotation.x = Math.PI / 2;
            face.position.z = 0.2;
            bodyGroup.add(face);

            // Floating Eyes (Small spheres)
            const eyeGeo = new THREE.SphereGeometry(0.1, 16, 16);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8 });

            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.25, 0.8, 0.75);
            bodyGroup.add(eyeL);

            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.25, 0.8, 0.75);
            bodyGroup.add(eyeR);

            // Floating Hands
            const handGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const handMat = new THREE.MeshStandardMaterial({ color: 0x38bdf8 });

            const handL = new THREE.Mesh(handGeo, handMat);
            handL.position.set(-1.2, 0.2, 0);
            bodyGroup.add(handL);

            const handR = new THREE.Mesh(handGeo, handMat);
            handR.position.set(1.2, 0.2, 0);
            bodyGroup.add(handR);

            scene.add(bodyGroup);
            camera.position.z = 4;

            // Animation Loop using GSAP for buttery smooth feel
            gsap.to(bodyGroup.position, { y: 0.1, duration: 2, repeat: -1, yoyo: true, ease: "sine.inOut" });
            gsap.to(bodyGroup.rotation, { y: 0.1, duration: 3, repeat: -1, yoyo: true, ease: "sine.inOut" });

            gsap.to(handL.position, { y: 0.3, duration: 2.5, repeat: -1, yoyo: true, ease: "sine.inOut" });
            gsap.to(handR.position, { y: 0.3, duration: 2.8, repeat: -1, yoyo: true, ease: "sine.inOut" });

            const animate = () => {
                requestAnimationFrame(animate);

                // Reactive animations
                if (botState === 'thinking') {
                    bodyGroup.rotation.y += 0.05;
                    handL.position.x = Math.sin(Date.now() * 0.01) * 1.5;
                    handR.position.x = -Math.sin(Date.now() * 0.01) * 1.5;
                }

                renderer.render(scene, camera);
            };
            animate();
        }

        function toggleEditMode() {
            isEditing = !isEditing;
            grid.setStatic(!isEditing);
            document.body.classList.toggle('editing', isEditing);
            document.getElementById('btn-edit').classList.toggle('active', isEditing);
            gsap.from('.grid-stack-item', { scale: 0.98, opacity: 0.5, stagger: 0.05, duration: 0.4 });
        }

        function toggleSidebar() {
            document.getElementById('widget-sidebar').classList.toggle('open');
        }

        function createWidget(type, title, config = {}) {
            const id = 'w-' + Date.now();
            const w = config.w || (type === 'agent' ? 3 : type === 'clock' ? 4 : 3);
            const h = config.h || (type === 'agent' ? 5 : 2);

            widgets[id] = { type, title, url: config.url || '' };

            let innerHtml = '';
            if (type === 'clock') {
                innerHtml = `
                    <div class="w-clock-lg">
                        <div class="time" id="time-${id}">00:00</div>
                        <div class="date" id="date-${id}">...</div>
                    </div>`;
                setTimeout(() => startClock(id), 10);
            } else if (type === 'agent') {
                innerHtml = `
                    <div class="bot-wrap" id="wrap-${id}">
                        <div class="bot-loader" id="loader-${id}">Initializing Mascot...</div>
                        <div class="thought-bubble" id="thought-${id}">Ready to assist.</div>
                        <div id="canvas-${id}" style="width:100%; height:100%;"></div>
                        <div style="position:absolute; bottom:15px; width:90%; left:5%; display:flex; gap:10px;">
                            <input type="text" placeholder="Speak..." id="chat-${id}" style="margin:0; padding:10px;" onkeydown="sendChat(event, '${id}')">
                        </div>
                    </div>`;

                // Use a ResizeObserver to wait for the element to have dimensions
                const observer = new ResizeObserver(() => {
                    const canvasDiv = document.getElementById(`canvas-${id}`);
                    if (canvasDiv && canvasDiv.clientWidth > 0 && canvasDiv.clientHeight > 0) {
                        initPillBot(`canvas-${id}`, id);
                        observer.disconnect();
                    }
                });
                setTimeout(() => {
                    const canvasDiv = document.getElementById(`canvas-${id}`);
                    if (canvasDiv) observer.observe(canvasDiv);
                }, 100);
            } else if (type === 'iframe') {
                const proxyUrl = config.url ? `/api/proxy?url=${encodeURIComponent(config.url)}` : 'about:blank';
                // Try direct first, fallback to proxy is handled by UI settings
                innerHtml = `<iframe src="${config.url || 'about:blank'}" id="frame-${id}"></iframe>`;
            } else if (type === 'stats') {
                innerHtml = `<div id="stats-${id}" style="text-align:center; font-family:monospace; font-size:1rem; color:var(--accent-blue);">Loading Telemetry...</div>`;
                setInterval(() => updateStats(id), 5000);
            }

            const header = isEditing ? 'initial' : 'none';
            grid.addWidget({
                id, x: 0, y: 0, w, h,
                content: `
                    <div class="widget-head">
                        <span class="title">${title}</span>
                        <div style="display:flex; gap:10px;">
                            <span onclick="openSettings('${id}')" style="cursor:pointer; opacity:0.5;">⚙️</span>
                            <span onclick="removeWidget('${id}')" style="cursor:pointer; opacity:0.5;">✕</span>
                        </div>
                    </div>
                    <div class="widget-body">${innerHtml}</div>`
            });
        }

        function removeWidget(id) {
            const el = document.querySelector(`[gs-id="${id}"]`);
            if (el) grid.removeWidget(el);
            delete widgets[id];
        }

        function openSettings(id) {
            const w = widgets[id];
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-title').value = w.title;
            document.getElementById('edit-url').value = w.url;
            document.getElementById('settings-title').innerText = `Settings: ${w.title}`;
            document.getElementById('url-label').style.display = (w.type === 'iframe' || w.type === 'stats') ? 'block' : 'none';
            document.getElementById('edit-url').style.display = (w.type === 'iframe' || w.type === 'stats') ? 'block' : 'none';
            document.getElementById('settings-overlay').style.display = 'flex';
        }

        function applySettings() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('edit-title').value;
            const url = document.getElementById('edit-url').value;

            widgets[id].title = title;
            widgets[id].url = url;

            // Update Title in Header
            const el = document.querySelector(`[gs-id="${id}"] .title`);
            if (el) el.innerText = title;

            // Update Iframe if needed
            const frame = document.getElementById(`frame-${id}`);
            if (frame) {
                // Heuristic: If it's HASS or an internal IP, maybe hint proxy?
                frame.src = url;
            }

            closeSettings();
        }

        function closeSettings() {
            document.getElementById('settings-overlay').style.display = 'none';
        }

        function startClock(id) {
            const update = () => {
                const now = new Date();
                const t = document.getElementById(`time-${id}`);
                const d = document.getElementById(`date-${id}`);
                if (t) t.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                if (d) d.innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
            };
            update(); setInterval(update, 1000);
        }

        async function updateStats(id) {
            try {
                const res = await fetch('/api/history'); // Simple ping to check life
                const el = document.getElementById(`stats-${id}`);
                if (el) el.innerHTML = `SYSTEM LIVE<br>DASHBOARD v31.2<br>ZERO-AUTH ACTIVE`;
            } catch (e) { }
        }

        function sendChat(e, id) {
            if (e.key === 'Enter') {
                const input = document.getElementById(`chat-${id}`);
                const bubble = document.getElementById(`thought-${id}`);
                const msg = input.value;
                if (!msg) return;
                input.value = '';

                botState = 'thinking';
                bubble.innerText = "...";
                bubble.style.display = 'block';

                fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                }).then(res => res.json()).then(data => {
                    botState = 'idle';
                    bubble.innerText = data.reply;
                    if (window.speechSynthesis) {
                        const ut = new SpeechSynthesisUtterance(data.reply);
                        ut.pitch = 1.5; ut.rate = 1.1;
                        window.speechSynthesis.speak(ut);
                    }
                    setTimeout(() => bubble.style.display = 'none', 8000);
                });
            }
        }

        function saveLayout() {
            const layout = grid.save().map(item => ({
                ...item,
                ...widgets[item.id]
            }));
            fetch('/api/kiosk_layout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ layout })
            }).then(() => {
                gsap.to('header', { backgroundColor: 'rgba(34, 197, 94, 0.4)', duration: 0.3, yoyo: true, repeat: 1 });
            });
        }

        async function loadLayout() {
            const res = await fetch('/api/kiosk_layout');
            const data = await res.json();
            grid.removeAll();
            data.layout.forEach(w => {
                createWidget(w.type, w.title, { ...w });
            });
        }

        window.onload = loadLayout;

    </script>
</body>

</html>
