<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViClaw Kiosk Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@7.2.3/dist/gridstack.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/gridstack@7.2.3/dist/gridstack-all.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent: #38bdf8;
            --text-color: #f8fafc;
            --blur: blur(20px);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(56, 189, 248, 0.05) 0%, transparent 40%);
        }

        #kiosk-viewport {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 60px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: var(--blur);
            z-index: 100;
        }

        .brand {
            font-weight: 800;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--card-border);
            border-color: var(--accent);
        }

        .btn.primary {
            background: var(--accent);
            color: #012;
            border: none;
        }

        .grid-stack {
            padding: 20px;
            flex: 1;
            overflow-y: auto !important;
        }

        .grid-stack-item-content {
            background: var(--card-bg) !important;
            backdrop-filter: var(--blur);
            border: 1px solid var(--card-border) !important;
            border-radius: 20px !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .widget-header {
            padding: 12px 18px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            opacity: 0.6;
            cursor: grab;
        }

        .widget-body {
            flex: 1;
            padding: 20px;
            position: relative;
            overflow: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .w-clock {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent);
            text-align: center;
        }

        .w-clock .date {
            font-size: 1.1rem;
            opacity: 0.7;
            font-weight: 400;
            color: white;
            margin-top: 5px;
        }

        .bot-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #avatar-canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .speech-bubble {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--accent);
            padding: 12px 18px;
            border-radius: 15px;
            font-size: 0.95rem;
            text-align: center;
            color: white;
            max-width: 80%;
            z-index: 10;
            position: absolute;
            top: 10%;
            display: none;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .speech-bubble.active {
            display: block;
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .bot-controls {
            width: 90%;
            z-index: 10;
            position: absolute;
            bottom: 10px;
            display: flex;
            gap: 10px;
        }

        .bot-controls input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
        }

        .bot-controls input:focus {
            border-color: var(--accent);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid var(--card-border);
            width: 90%;
            max-width: 500px;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            border-radius: 10px;
            margin-top: 5px;
            outline: none;
        }
    </style>
</head>

<body>
    <div id="kiosk-viewport">
        <header>
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                </svg>
                VICLAW KIOSK v31.1
            </div>
            <div class="toolbar">
                <button class="btn" onclick="toggleEdit()">
                    <span id="edit-icon">✎</span> <span id="edit-text">Edit Layout</span>
                </button>
                <button class="btn" onclick="showAddWidget()">+</button>
                <button class="btn primary" onclick="saveLayout()">Save Changes</button>
            </div>
        </header>
        <div class="grid-stack"></div>
    </div>

    <div id="widget-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; font-weight:800;">Add Widget</h2>
            <div style="display:flex; flex-direction:column; gap:20px;">
                <label>Type
                    <select id="w-type">
                        <option value="clock">Clock & Date</option>
                        <option value="agent">3D AI Assistant</option>
                        <option value="weather">Weather</option>
                        <option value="iframe">iFrame / Website</option>
                        <option value="stats">System Health</option>
                    </select>
                </label>
                <label>Title <input type="text" id="w-title" placeholder="My Widget"></label>
                <label>URL <input type="text" id="w-url" placeholder="https://..."></label>
                <div style="display:flex; gap:12px; margin-top:10px;">
                    <button class="btn primary" style="flex:1;" onclick="addWidgetAction()">Add Widget</button>
                    <button class="btn" style="flex:1;" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let grid = GridStack.init({ cellHeight: 80, margin: 10, staticGrid: true });
        let isEditing = false;
        let widgetMetadata = {};

        // Three.js Globals
        let scene, camera, renderer, botHead, eye, glow;
        let botState = 'idle'; // idle, thinking, happy, concern

        function toggleEdit() {
            isEditing = !isEditing;
            grid.setStatic(!isEditing);
            document.getElementById('edit-text').innerText = isEditing ? 'Lock Layout' : 'Edit Layout';
            document.getElementById('edit-icon').innerText = isEditing ? '✓' : '✎';
            document.body.style.cursor = isEditing ? 'initial' : 'none';
        }

        function showAddWidget() { document.getElementById('widget-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('widget-modal').style.display = 'none'; }

        function createWidget(w) {
            widgetMetadata[w.id] = { type: w.type, title: w.title, url: w.url };
            let content = '';
            if (w.type === 'clock') {
                content = `<div class="w-clock"><div id="time-${w.id}">00:00</div><div class="date" id="date-${w.id}">Loading...</div></div>`;
                setTimeout(() => setupClock(w.id), 10);
            } else if (w.type === 'agent') {
                content = `<div class="bot-container">
                    <div class="speech-bubble" id="bubble-${w.id}">System Ready.</div>
                    <div id="avatar-canvas-container"></div>
                    <div class="bot-controls">
                        <button class="btn" style="padding:10px; border-radius:50%;" onclick="startVoice('${w.id}')">🎙️</button>
                        <input type="text" id="agent-input-${w.id}" placeholder="Type message..." onkeydown="handleAgentKey(event, '${w.id}')">
                    </div>
                </div>`;
                setTimeout(() => initThreeJS(w.id), 100);
            } else if (w.type === 'weather') {
                content = `<div style="text-align:center;"><div id="temp-${w.id}" style="font-size:3rem; font-weight:800;">--°C</div><div id="cond-${w.id}" style="opacity:0.7;">...</div></div>`;
                setTimeout(() => fetchWeather(w.id), 10);
            } else if (w.type === 'iframe') {
                content = `<iframe src="${w.url}"></iframe>`;
            } else if (w.type === 'stats') {
                content = `<div id="stats-${w.id}" style="font-family:monospace; font-size:0.9rem; line-height:1.6; opacity:0.8;">Loading...</div>`;
                setTimeout(() => fetchStats(w.id), 10);
            }

            grid.addWidget({
                id: w.id, x: w.x, y: w.y, w: w.w, h: w.h,
                content: `<div class="widget-header"><span>${w.title || w.type}</span> <span onclick="removeWidget('${w.id}')" style="cursor:pointer;">✕</span></div><div class="widget-body">${content}</div>`
            });
        }

        function initThreeJS(widgetId) {
            const container = document.getElementById('avatar-canvas-container');
            if (!container) return;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x38bdf8, 1);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            // Bot Head (Spherical/Rounded Box)
            const geometry = new THREE.SphereGeometry(1, 40, 40);
            const material = new THREE.MeshStandardMaterial({ color: 0x1e293b, metalness: 0.8, roughness: 0.2 });
            botHead = new THREE.Mesh(geometry, material);
            scene.add(botHead);

            // "Face" Shield
            const faceGeo = new THREE.SphereGeometry(0.95, 30, 30, 0, Math.PI * 2, 0, Math.PI / 2.5);
            const faceMat = new THREE.MeshBasicMaterial({ color: 0x0f172a });
            const face = new THREE.Mesh(faceGeo, faceMat);
            face.rotation.x = Math.PI / 1.5;
            botHead.add(face);

            // Eye (Central LED)
            const eyeGeo = new THREE.SphereGeometry(0.15, 20, 20);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00d2d3 });
            eye = new THREE.Mesh(eyeGeo, eyeMat);
            eye.position.set(0, 0.3, 0.85);
            botHead.add(eye);

            // Eye Glow
            const glowGeo = new THREE.SphereGeometry(0.3, 20, 20);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0x00d2d3, transparent: true, opacity: 0.3 });
            glow = new THREE.Mesh(glowGeo, glowMat);
            glow.position.copy(eye.position);
            botHead.add(glow);

            camera.position.z = 3;

            // Animation Loop
            let time = 0;
            const animate = () => {
                requestAnimationFrame(animate);
                time += 0.05;

                // 1. Standby: Breathing
                botHead.scale.setScalar(1 + Math.sin(time * 0.5) * 0.03);

                // 2. Standby: Random Look Around
                if (botState === 'idle') {
                    botHead.rotation.y = Math.sin(time * 0.2) * 0.3;
                    botHead.rotation.x = Math.cos(time * 0.3) * 0.1;
                    eye.material.color.setHex(0x38bdf8);

                    // NEW: Random Blinking
                    if (Math.random() < 0.01) {
                        eye.scale.y = 0.1;
                        setTimeout(() => eye.scale.y = 1, 150);
                    }
                } else if (botState === 'thinking') {
                    // 3. Thinking Animation
                    botHead.rotation.y += 0.1;
                    eye.material.color.setHex(0xa855f7);
                } else if (botState === 'happy') {
                    botHead.scale.y = 1 + Math.abs(Math.sin(time * 2)) * 0.1;
                    eye.material.color.setHex(0x22c55e);
                }

                renderer.render(scene, camera);
            };
            animate();

            // Periodic Idle Thoughts
            setInterval(() => {
                if (botState === 'idle') {
                    const thoughts = [
                        "Scanning local subnet...",
                        "Memory optimized.",
                        "Ollama is responding within 200ms.",
                        "Everything looks green.",
                        "Waiting for your command.",
                        "Rethinking the universe...",
                        "I wonder if I can run Doom?",
                        "System integrity verified.",
                        "Listening via X-Local-Auth..."
                    ];
                    showBubble(thoughts[Math.floor(Math.random() * thoughts.length)], widgetId);
                }
            }, 45000);
        }

        function showBubble(text, id) {
            const bubble = document.getElementById(`bubble-${id}`);
            if (!bubble) return;
            bubble.innerText = text;
            bubble.classList.add('active');
            setTimeout(() => bubble.classList.remove('active'), 5000);
        }

        function setupClock(id) {
            const update = () => {
                const now = new Date();
                const tEl = document.getElementById(`time-${id}`);
                const dEl = document.getElementById(`date-${id}`);
                if (tEl) tEl.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                if (dEl) dEl.innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
            };
            update(); setInterval(update, 10000);
        }

        function fetchWeather(id) {
            fetch('https://wttr.in/?format=j1').then(res => res.json()).then(data => {
                const cond = data.current_condition[0];
                document.getElementById(`temp-${id}`).innerText = cond.temp_C + '°C';
                document.getElementById(`cond-${id}`).innerText = cond.weatherDesc[0].value;
            });
        }

        function fetchStats(id) {
            fetch('/api/diagnostics').then(res => res.json()).then(data => {
                const el = document.getElementById(`stats-${id}`);
                if (el) el.innerHTML = `Daemon: ${data.daemon_status}<br>Model: ${data.model}<br>DB: ${data.db_size}`;
            });
        }

        function handleAgentKey(e, id) {
            if (e.key === 'Enter') {
                const input = document.getElementById(`agent-input-${id}`);
                const msg = input.value;
                if (!msg) return;
                input.value = '';
                botState = 'thinking';
                fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                }).then(res => res.json()).then(data => {
                    botState = 'happy';
                    showBubble(data.reply, id);
                    if (window.speechSynthesis) window.speechSynthesis.speak(new SpeechSynthesisUtterance(data.reply));
                    setTimeout(() => botState = 'idle', 5000);
                });
            }
        }

        function saveLayout() {
            const layout = grid.save().map(item => {
                const meta = widgetMetadata[item.id] || { type: 'unknown' };
                return { id: item.id, x: item.x, y: item.y, w: item.w, h: item.h, type: meta.type, title: meta.title, url: meta.url };
            });
            fetch('/api/kiosk_layout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ layout }) })
                .then(() => alert('Layout saved. (v31.1)'));
        }

        function loadLayout() {
            fetch('/api/kiosk_layout').then(res => res.json()).then(data => {
                grid.removeAll(); widgetMetadata = {};
                data.layout.forEach(w => createWidget(w));
            });
        }

        function removeWidget(id) {
            const el = document.querySelector(`[gs-id="${id}"]`);
            if (el) grid.removeWidget(el);
            delete widgetMetadata[id];
        }

        function addWidgetAction() {
            const type = document.getElementById('w-type').value;
            const title = document.getElementById('w-title').value;
            const url = document.getElementById('w-url').value;
            const id = 'w-' + Date.now();
            createWidget({ id, type, title, url, x: 0, y: 0, w: 4, h: 4 });
            closeModal();
        }

        window.onload = loadLayout;
    </script>
</body>

</html>
